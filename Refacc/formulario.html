<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario Gamer</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
    color: white;
    margin:0;
    padding:0;
}

.container{
    width: 400px;
    margin: 50px auto;
    background: rgba(0,0,0,0.7);
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 15px #00f7ff;
}

h1{
    text-align:center;
    color:#00f7ff;
}

label{
    display:block;
    margin-top:10px;
}

input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:6px;
    border:none;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#00f7ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00c3cc;
}

.game-images{
    display:flex;
    justify-content:space-around;
    margin-top:15px;
}

.game-images img{
    width:80px;
    height:80px;
    border-radius:10px;
    transition:0.3s;
}

.game-images img:hover{
    transform:scale(1.1);
}

</style>
</head>

<body>

<div class="container">

<h1>juegos populares🎮</h1>

<form>

<label>Nombre:</label>
<input type="text" placeholder="Tu nombre">

<label>Edad:</label>
<input type="number">

<label>Juego favorito:</label>
<select>
<option>clash royale</option>
<option>Fortnite</option>
<option>Call of Duty</option>
<option>Free Fire</option>
<option>GTA V</option>
</select>

<label>¿Cuántas horas juegas al día?</label>
<select>
<option>1-2 horas</option>
<option>3-4 horas</option>
<option>5-6 horas</option>
<option>Más de 6 horas</option>
</select>

<div class="game-images">
<img src="https://cdn-icons-png.flaticon.com/512/686/686589.png">
<img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png">
<img src="https://cdn-icons-png.flaticon.com/512/1047/1047711.png">
</div>

<button type="submit">Enviar 🎮</button>

<a href="file:///C:/Users/maxyv/OneDrive/Documentos/Refacc/Refacc/index.html">Volver</a>

</form>

</div>

</body>
</html>
