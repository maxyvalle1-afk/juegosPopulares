<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería de Imágenes</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

/* Encabezado */
header{
    text-align:center;
    padding:30px;
    background:#020617;
}

header h1{
    font-size:40px;
}

/* Galería */
.galeria{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

/* Tarjetas de imagen */
.card{
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 20px rgba(0,0,0,0.4);
    transition:transform 0.3s, box-shadow 0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 15px 25px rgba(0,0,0,0.6);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card p{
    padding:15px;
    text-align:center;
}

/* Footer */
footer{
    text-align:center;
    padding:20px;
    background:#020617;
}

</style>
</head>

<body>

<header>
<h1>juegos populares</h1>
<p>fornite skins</p>
</header>
